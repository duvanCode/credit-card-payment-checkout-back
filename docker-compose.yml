services:
  db:
    image: postgres:16-alpine
    container_name: checkout-postgres
    environment:
      POSTGRES_DB: credit_card_checkout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkout-backend
    depends_on:
      - db
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/credit_card_checkout?schema=public
      PAYMENT_GATEWAY_SANDBOX_URL: ${PAYMENT_GATEWAY_SANDBOX_URL}
      PAYMENT_GATEWAY_PUBLIC_KEY: ${PAYMENT_GATEWAY_PUBLIC_KEY}
      PAYMENT_GATEWAY_PRIVATE_KEY: ${PAYMENT_GATEWAY_PRIVATE_KEY}
      PAYMENT_GATEWAY_EVENTS_KEY: ${PAYMENT_GATEWAY_EVENTS_KEY}
      PAYMENT_GATEWAY_INTEGRITY_KEY: ${PAYMENT_GATEWAY_INTEGRITY_KEY}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
